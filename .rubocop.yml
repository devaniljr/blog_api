require:
  - rubocop-rails
  - rubocop-rspec

AllCops:
  NewCops: enable
  TargetRubyVersion: 4.0
  Exclude:
    - "db/**/*"
    - "bin/**/*"
    - "vendor/**/*"
    - "config/**/*"
    - "node_modules/**/*"
    - "log/**/*"
    - "tmp/**/*"

Style/Documentation:
  Enabled: false

Metrics/BlockLength:
  Enabled: false

Metrics/MethodLength:
  Max: 15

Layout/LineLength:
  Max: 120

Metrics/AbcSize:
  Max: 20

Lint/MissingSuper:
  Enabled: false

RSpec/MultipleExpectations:
  Max: 4

RSpec/ExampleLength:
  Max: 6

Naming/VariableNumber:
  AllowedPatterns:
    - 'ip_\d+'
