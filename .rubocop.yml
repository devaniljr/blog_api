require:
  - rubocop-rails
  - rubocop-rspec

AllCops:
  NewCops: enable
  TargetRubyVersion: 4.0
  Exclude:
    - "db/**/*"
    - "bin/**/*"
    - "vendor/**/*"
    - "config/**/*"
    - "node_modules/**/*"
    - "log/**/*"
    - "tmp/**/*"

Style/Documentation:
  Enabled: false

Metrics/BlockLength:
  Enabled: false

Metrics/MethodLength:
  Max: 15

Layout/LineLength:
  Max: 120
